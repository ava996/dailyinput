app:
  timezone: "Asia/Shanghai"
  show_version_update: false

schedule:
  enabled: false
  preset: "custom"

platforms:
  enabled: true
  sources:
    - id: "zhihu"
      name: "知乎"
    - id: "36kr-renqi"
      name: "36氪人气榜"
    - id: "wallstreetcn-hot"
      name: "华尔街见闻"
    - id: "cls-hot"
      name: "财联社热门"

rss:
  enabled: true
  freshness_filter:
    enabled: true
    max_age_days: 2
  feeds:
    - id: "openai"
      name: "OpenAI News"
      url: "https://openai.com/news/rss.xml"
      max_age_days: 5
    - id: "anthropic"
      name: "Anthropic News"
      url: "https://raw.githubusercontent.com/0xSMW/rss-feeds/main/feeds/feed_anthropic_news.xml"
      max_age_days: 5
    - id: "google-ai"
      name: "Google AI Blog"
      url: "https://blog.google/technology/ai/rss/"
      max_age_days: 5
    - id: "huggingface"
      name: "Hugging Face Blog"
      url: "https://huggingface.co/blog/feed.xml"
      max_age_days: 5
    - id: "product-hunt"
      name: "Product Hunt"
      url: "https://www.producthunt.com/feed"
      max_age_days: 2
    - id: "huxiu"
      name: "虎嗅"
      url: "https://rss.huxiu.com/"
      max_age_days: 2
      max_items: 20
    - id: "builders"
      name: "AI Builders"
      url: "http://127.0.0.1:8765/builders.json"
      max_age_days: 3
      max_items: 40

report:
  mode: "current"
  display_mode: "keyword"
  sort_by_position_first: true
  rank_threshold: 5
  max_news_per_keyword: 4

filter:
  method: "ai"
  priority_sort_enabled: true

ai_filter:
  batch_size: 120
  batch_interval: 2
  min_score: 0.70
  reclassify_threshold: 0.6
  prompt_file: "prompt.txt"
  extract_prompt_file: "extract_prompt.txt"
  update_tags_prompt_file: "update_tags_prompt.txt"

display:
  region_order:
    - hotlist
    - rss
    - ai_analysis
  regions:
    hotlist: true
    new_items: false
    rss: true
    standalone: false
    ai_analysis: true
  standalone:
    platforms: []
    rss_feeds: []
    max_items: 0

notification:
  enabled: true
  channels:
    feishu:
      webhook_url: ""
    dingtalk:
      webhook_url: ""
    wework:
      webhook_url: ""
      msg_type: "markdown"
    telegram:
      bot_token: ""
      chat_id: ""
    email:
      from: "1441469055@qq.com"
      password: ""
      to: "1441469055@qq.com"
      smtp_server: "smtp.qq.com"
      smtp_port: "465"
    ntfy:
      server_url: "https://ntfy.sh"
      topic: ""
      token: ""
    bark:
      url: ""
    slack:
      webhook_url: ""
    generic_webhook:
      webhook_url: ""
      payload_template: ""

storage:
  backend: "local"
  formats:
    sqlite: true
    txt: false
    html: true
  local:
    data_dir: "output"
    retention_days: 7
  remote:
    retention_days: 0
    endpoint_url: ""
    bucket_name: ""
    access_key_id: ""
    secret_access_key: ""
    region: ""
  pull:
    enabled: false
    days: 7

ai:
  model: "deepseek/deepseek-v4-flash"
  api_key: ""
  api_base: ""
  timeout: 120
  temperature: 1.0
  max_tokens: 3000
  num_retries: 1
  fallback_models: []

ai_analysis:
  enabled: true
  language: "Chinese"
  prompt_file: "ai_analysis_prompt.txt"
  mode: "current"
  max_news_for_analysis: 60
  include_rss: true
  include_standalone: false
  include_rank_timeline: false

ai_translation:
  enabled: true
  language: "中文"
  prompt_file: "ai_translation_prompt.txt"
  scope:
    hotlist: false
    rss: true
    standalone: false

advanced:
  debug: false
  version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version"
  mcp_version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_mcp"
  configs_version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_configs"
  crawler:
    request_interval: 2000
    use_proxy: false
    default_proxy: "http://127.0.0.1:10801"
  rss:
    request_interval: 1000
    timeout: 15
    use_proxy: false
    proxy_url: ""
  weight:
    rank: 0.6
    frequency: 0.3
    hotness: 0.1
  max_accounts_per_channel: 3
  batch_size:
    default: 4000
    dingtalk: 20000
    feishu: 30000
    bark: 4000
    slack: 4000
  batch_send_interval: 3
  feishu_message_separator: "━━━━━━━━━━━━━━━━"
